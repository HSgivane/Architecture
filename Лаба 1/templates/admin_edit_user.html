{% extends "base.html" %}
{% block title %}Изменение роли{% endblock %}
{% block content %}
<h2>Изменить роль — {{ user["username"] }}</h2>
<form method="post" style="max-width: 320px;">
    <div class="form-group">
        <label>Роль</label>
        <select name="role">
            <option value="viewer"    {% if user["role"] == "viewer"    %}selected{% endif %}>viewer</option>
            <option value="moderator" {% if user["role"] == "moderator" %}selected{% endif %}>moderator</option>
            <option value="admin"     {% if user["role"] == "admin"     %}selected{% endif %}>admin</option>
        </select>
    </div>
    <button type="submit">Сохранить</button>
    <a href="{{ url_for('users') }}" class="btn btn-secondary" style="margin-left:8px;">Отмена</a>
</form>
{% endblock %}
