{% extends "base.html" %}
{% block title %}Пользователи{% endblock %}
{% block content %}
<h2>Пользователи</h2>
<ul>
{% for user in users %}
    <li>
        {{ user["username"] }} — {{ user["role"] }}
        <a href="{{ url_for('admin_edit_user', user_id=user['id']) }}">Изменить роль</a>
    </li>
{% endfor %}
</ul>
{% endblock %}
