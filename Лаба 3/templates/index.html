<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ČNB курсы</title>
  <style>
    body { font-family: monospace; max-width: 600px; margin: 40px auto; padding: 0 16px; }
    h2 { margin-bottom: 24px; }
    .block { margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; color: #555; }
    input[type="date"], input[type="text"] {
      padding: 6px 10px; font-family: monospace; font-size: 14px;
      border: 1px solid #ccc; border-radius: 4px; margin-right: 8px;
    }
    button {
      padding: 6px 14px; font-family: monospace; font-size: 14px;
      background: #2c6fad; color: white; border: none;
      border-radius: 4px; cursor: pointer;
    }
    button:hover { background: #1a5390; }
    pre { background: #f4f4f4; padding: 12px; border-radius: 4px; overflow-x: auto; font-size: 13px; }
  </style>
</head>
<body>
  <h2>ČNB — курсы чешской кроны</h2>

  <div class="block">
    <label>Синхронизировать сегодня</label>
    <button onclick="syncToday()">Синхронизировать</button>
  </div>

  <div class="block">
    <label>Синхронизировать за дату</label>
    <input type="date" id="syncDate">
    <button onclick="syncDate()">Синхронизировать</button>
  </div>

  <div class="block">
    <label>Показать курсы (необязательно: фильтр по валютам через запятую)</label>
    <input type="text" id="currencies" placeholder="USD, EUR, GBP">
    <button onclick="getRates()">Показать</button>
  </div>

  <pre id="result">—</pre>

  <script>
    async function call(url) {
      document.getElementById("result").textContent = "загрузка...";
      try {
        const resp = await fetch(url);
        const data = await resp.json();
        document.getElementById("result").textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById("result").textContent = "Ошибка: " + e.message;
      }
    }

    function syncToday() { call("/sync"); }

    function syncDate() {
      const d = document.getElementById("syncDate").value;
      if (!d) return alert("Выберите дату");
      call("/sync?date=" + d);
    }

    function getRates() {
      const c = document.getElementById("currencies").value.trim();
      call("/rates" + (c ? "?currency=" + encodeURIComponent(c) : ""));
    }
  </script>
</body>
</html>
